name: Core Engine Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Build
      run: |
        echo "Building core engine"
        echo "Success!" >> build.log
    - name: Save build log
      uses: actions/upload-artifact@v2
      with:
        name: build.log
        path: build.log